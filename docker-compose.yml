version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: store_intelligence
      POSTGRES_USER: si_user
      POSTGRES_PASSWORD: si_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U si_user -d store_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Intelligence API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://si_user:si_password_2026@db:5432/store_intelligence
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=store_intelligence
      - POSTGRES_USER=si_user
      - POSTGRES_PASSWORD=si_password_2026
      - USE_SQLITE=false
      - LOG_LEVEL=INFO
      - APP_VERSION=1.0.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Detection Pipeline (run separately) ──────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    environment:
      - API_URL=http://api:8000
      - STORE_LAYOUT=/app/data/store_layout.json
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./clips:/app/clips:ro
      - ./output:/app/output
    profiles:
      - pipeline  # Only runs when explicitly requested: docker compose --profile pipeline run pipeline

volumes:
  pgdata:
